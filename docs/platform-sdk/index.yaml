invariants:
  - "No cycles in dependency graph"
  - "Collections SDK (KA-SDK-002) has no dependencies — it is the foundation"
  - "No SDK depends on AI Runtime, ProductFactory, or ContentFactory"
  - "No SDK contains hardcoded file paths"
  - "All public interfaces use Python Protocol or ABC — no concrete leakage"
  - "All operations declare O() complexity"

freeze:
