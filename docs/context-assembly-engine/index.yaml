phase: 3.0D.1
name: Context Assembly Engine
status: CANONICAL
architecture_version: CAE-1.0.0
frozen_at: "2026-06-30"
owner: architecture-board

description: >
  The Context Assembly Engine (CAE) transforms a query, consumer profile, and
  token budget into a typed context pack. It is the operational core of KOS —
  the system that makes KOS a Knowledge Operating System rather than a
  documentation system.

