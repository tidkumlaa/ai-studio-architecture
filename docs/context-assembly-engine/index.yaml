dependencies:
  requires:
    - phase: "3.0D.0.6"
      name: Knowledge Intelligence Layer
      reason: KIL intelligence blocks are the source of all rendered content
    - phase: "3.0D.0.5"
      name: KOS Final
      reason: KnowledgeObject schema v1.0 and all relationship types

  does_not_implement:
    - Knowledge Runtime
    - Knowledge Graph
    - Compiler
    - Query Engine
    - AI inference
    - Graph traversal engine
    - Database or storage layer
